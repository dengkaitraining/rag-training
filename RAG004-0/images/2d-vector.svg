<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="auto" style="background-color: #ffffff;">
  <!-- 定義箭頭樣式 -->
  <defs>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#000000" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#e53e3e" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#b85cb8" />
    </marker>
  </defs>

  <!-- 原點位置為 (300, 200) -->
  
  <!-- X 軸與 Y 軸 -->
  <line x1="120" y1="200" x2="480" y2="200" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-black)" />
  <line x1="300" y1="350" x2="300" y2="50" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-black)" />

  <!-- 第一象限：紅色向量 -->
  <line x1="300" y1="200" x2="400" y2="140" stroke="#e53e3e" stroke-width="3" marker-end="url(#arrow-red)" />
  
  <!-- 第二象限：紫色向量 -->
  <line x1="300" y1="200" x2="200" y2="110" stroke="#b85cb8" stroke-width="2.5" marker-end="url(#arrow-purple)" />
  
  <!-- 第三象限：紫色向量 -->
  <line x1="300" y1="200" x2="240" y2="300" stroke="#b85cb8" stroke-width="2.5" marker-end="url(#arrow-purple)" />

  <!-- 角度 θ 弧線與標記 -->
  <!-- 弧線從 X 軸正方向 (350, 200) 掃向紅色向量方向 -->
  <path d="M 350 200 A 50 50 0 0 0 342 175" fill="none" stroke="#b85cb8" stroke-width="2" />
  <text x="352" y="180" font-family="'Times New Roman', Times, serif" font-size="20" font-style="italic" fill="#b85cb8" font-weight="bold">θ</text>
</svg>
