<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flask Form Example</title>
</head>
<body>

    <h1>Flask Form 範例</h1>

    <form action="/process" method="POST">
        <label for="user_prompt">請輸入 User Prompt：</label>
        <input type="text" id="user_prompt" name="user_prompt">

        <button type="submit">送出</button>
    </form>

</body>
</html>
