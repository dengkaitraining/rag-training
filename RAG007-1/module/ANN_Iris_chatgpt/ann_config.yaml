# ============================
# ANN Model Parameters
# ============================

# 4x2x3
#
# Input Layer
#   4 neurons
#      ↓
# Hidden Layer
#   2 neurons
#      ↓
# Output Layer
#   3 neurons
#
dataset:
  name: iris

model:
  input_neurons: 4
  hidden_neurons: 2
  output_neurons: 3
  hidden_activation: logistic
  output_activation: logistic
  solver: adam
  learning_rate_init: 0.01
  max_iter: 1000
  random_state: 100

train:
  test_size: 0.30
  random_state: 100