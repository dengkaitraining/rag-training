<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Flask Form 範例</title>
</head>
<body>
    <h1>Flask Form 範例</h1>
    <form action="/process" method="POST">
        <label for="user_prompt">請輸入 Prompt：</label>
        <input type="text" id="user_prompt" name="user_prompt" required>
        <button type="submit">送出</button>
    </form>
</body>
</html>
